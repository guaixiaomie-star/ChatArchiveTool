<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>通用聊天档案馆</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-blue: #6fb7ff;
            --primary-blue-dark: #4c9ef0;
            --primary-blue-light: #dff1ff;
            --bg-main: #f4faff;
            --bg-panel: #eef7ff;
            --bg-card: #ffffff;
            --text-main: #46607a;
            --text-muted: #7b93aa;
            --border-color: rgba(111, 183, 255, 0.35);
            --bubble-ai: #ffffff;
            --bubble-user: #dff1ff;
            --bubble-tool: #eef2f7;
            --shadow-soft: 0 8px 24px rgba(103, 159, 220, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background: var(--bg-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 18px;
            border-bottom: 1px dashed var(--border-color);
        }

        .app-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary-blue-dark);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .btn-action {
            flex: 1;
            padding: 10px 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 18px rgba(111, 183, 255, 0.25);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            background: var(--primary-blue-dark);
        }

        .counter-box {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding: 12px;
            background: #fff;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-soft);
        }

        .counter-box strong {
            color: var(--primary-blue-dark);
            font-size: 1.08rem;
        }

        .search-box {
            width: 100%;
            padding: 10px 14px;
            border-radius: 18px;
            border: 2px solid var(--primary-blue);
            outline: none;
            font-size: 0.9rem;
            margin-bottom: 10px;
            background: white;
            color: var(--text-main);
        }

        .search-box:focus {
            box-shadow: 0 0 0 4px rgba(111, 183, 255, 0.18);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag-btn {
            font-size: 0.74rem;
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid var(--primary-blue);
            background: #fff;
            color: var(--primary-blue-dark);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag-btn.active,
        .tag-btn:hover {
            background: var(--primary-blue);
            color: white;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .session-item {
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.55);
        }

        .session-item:hover {
            background: rgba(255,255,255,0.9);
        }

        .session-item.active {
            background: #fff;
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-soft);
        }

        .session-title {
            font-weight: 700;
            font-size: 0.93rem;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-meta {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: center;
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .meta-left {
            display: flex;
            gap: 6px;
            align-items: center;
            overflow: hidden;
        }

        .badge {
            padding: 2px 7px;
            border-radius: 999px;
            font-size: 0.68rem;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .source-badge {
            background: #e8f4ff;
            color: #2e7fd0;
            border-color: #c7e3ff;
        }

        .model-badge {
            background: #f2f8ff;
            color: #6185aa;
            border-color: #d9e9f8;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            background: rgba(244, 250, 255, 0.95);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .chat-title-wrap {
            min-width: 0;
        }

        .current-chat-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-blue-dark);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 22px 40px 34px;
            display: flex;
            flex-direction: column;
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 54px;
            margin-bottom: 10px;
        }

        .message-row {
            display: flex;
            width: 100%;
            margin-bottom: 14px;
            align-items: flex-start;
        }

        .assistant-msg,
        .tool-msg,
        .system-msg {
            flex-direction: row;
        }

        .user-msg {
            flex-direction: row-reverse;
        }

        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .assistant-msg .avatar-container,
        .tool-msg .avatar-container,
        .system-msg .avatar-container {
            margin-right: 12px;
        }

        .user-msg .avatar-container {
            margin-left: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .avatar-name {
            font-size: 0.66rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 700;
            max-width: 90px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bubble {
            width: fit-content;
            max-width: 74%;
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.55;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            position: relative;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .assistant-msg .bubble {
            background: var(--bubble-ai);
            border-top-left-radius: 4px;
        }

        .user-msg .bubble {
            background: var(--bubble-user);
            border-top-right-radius: 4px;
        }

        .tool-msg .bubble,
        .system-msg .bubble {
            background: var(--bubble-tool);
            border-top-left-radius: 4px;
        }

        .message-model {
            display: inline-block;
            font-size: 0.72rem;
            color: #5f83a8;
            background: #eef6ff;
            border: 1px solid #d7e9fb;
            border-radius: 999px;
            padding: 2px 8px;
            margin-bottom: 8px;
        }

        .text-content {
            margin: 0;
            padding: 0;
        }

        .reasoning-toggle {
            font-size: 0.76rem;
            color: #7d94ad;
            cursor: pointer;
            margin-bottom: 6px;
            display: inline-block;
            user-select: none;
        }

        .reasoning-toggle::before {
            content: "💭 ";
        }

        .reasoning-box {
            background: rgba(111, 183, 255, 0.08);
            color: #6d8197;
            font-size: 0.8rem;
            padding: 7px 10px;
            border-radius: 10px;
            margin: 4px 0 8px 0;
            border-left: 3px solid #b7dafc;
            display: none;
            white-space: pre-wrap;
        }

        .chat-image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .chat-bubble-img {
            max-width: 260px;
            width: auto;
            max-height: 300px;
            border-radius: 12px;
            box-shadow: 0 5px 14px rgba(0,0,0,0.08);
            cursor: zoom-in;
            transition: transform 0.2s ease;
            background: #fff;
        }

        .chat-bubble-img:hover {
            transform: scale(1.02);
        }

        .msg-time {
            font-size: 0.66rem;
            color: #9db0c2;
            margin-top: 6px;
            position: absolute;
            bottom: -18px;
            white-space: nowrap;
        }

        .assistant-msg .msg-time,
        .tool-msg .msg-time,
        .system-msg .msg-time {
            left: 4px;
        }

        .user-msg .msg-time {
            right: 4px;
        }

        .stats-modal,
        .gallery-modal,
        .image-lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            background: rgba(232, 244, 255, 0.82);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            width: 86%;
            max-width: 1040px;
            max-height: 86vh;
            border-radius: 22px;
            padding: 28px;
            overflow-y: auto;
            box-shadow: 0 18px 40px rgba(76, 158, 240, 0.18);
            border: 2px solid #cce7ff;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 22px;
            font-size: 34px;
            color: var(--primary-blue-dark);
            cursor: pointer;
            line-height: 1;
            transition: transform 0.2s ease;
        }

        .modal-close:hover {
            transform: rotate(90deg) scale(1.08);
        }

        .modal-title {
            color: var(--primary-blue-dark);
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .chart-box {
            background: #f7fbff;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
            text-align: center;
        }

        .chart-box h3 {
            margin-top: 0;
            color: var(--text-main);
            font-size: 1.04rem;
        }

        .canvas-container {
            width: 100%;
            min-height: 300px;
        }

        .word-cloud-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 14px;
            padding: 12px;
            min-height: 220px;
        }

        .cloud-word {
            font-weight: 700;
            transition: 0.25s ease;
            cursor: default;
            user-select: none;
        }

        .cloud-word:hover {
            transform: scale(1.12) translateY(-2px) !important;
        }

        .image-lightbox img {
            max-width: 92%;
            max-height: 92vh;
            border-radius: 16px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.16);
        }

        .gallery-grid {
            column-count: 3;
            column-gap: 18px;
            padding-top: 8px;
        }

        .gallery-card {
            background: white;
            padding: 12px;
            border-radius: 14px;
            box-shadow: 0 5px 16px rgba(0,0,0,0.06);
            margin-bottom: 18px;
            break-inside: avoid;
            transition: transform 0.25s ease;
            cursor: pointer;
        }

        .gallery-card:hover {
            transform: scale(1.02) translateY(-3px);
        }

        .gallery-card img {
            width: 100%;
            border-radius: 10px;
            display: block;
            margin-bottom: 10px;
        }

        .gallery-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .loading-box,
        .error-box {
            padding: 18px;
            margin: 18px;
            border-radius: 16px;
            background: white;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
        }

        .error-box {
            color: #b45252;
            background: #fff7f7;
            border-color: #ffd4d4;
        }

        mark {
            background: #fff1a8;
            color: inherit;
            padding: 0 2px;
            border-radius: 4px;
        }

        @media (max-width: 980px) {
            .sidebar {
                width: 290px;
            }

            .messages-container {
                padding: 18px 18px 30px;
            }

            .bubble {
                max-width: 88%;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .gallery-grid {
                column-count: 2;
            }
        }

        @media (max-width: 720px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 42vh;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .gallery-grid {
                column-count: 1;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="app-title">☁️ 通用聊天档案馆</div>

            <div class="btn-row">
                <button class="btn-action" onclick="openStats()">📊 数据看板</button>
                <button class="btn-action" onclick="openGallery()">🖼️ 图片画廊</button>
            </div>

            <div class="counter-box">
                <div>共收录 <strong id="totalSessionCount">0</strong> 个会话</div>
                <div>共提取 <strong id="totalMessageCount">0</strong> 条消息</div>
            </div>

            <input id="searchInput" class="search-box" type="text" placeholder="🔍 搜索标题、内容、模型..." />

            <div class="filter-tags" id="filterTags"></div>
        </div>

        <div id="sessionList" class="session-list">
            <div class="loading-box">正在读取 archive.json ...</div>
        </div>
    </aside>

    <main class="main-chat">
        <header class="chat-header">
            <div class="chat-title-wrap">
                <div id="chatTitle" class="current-chat-title">📂 选择一段会话</div>
                <div id="chatMeta" class="chat-meta">等待载入数据</div>
            </div>
        </header>

        <div id="messagesArea" class="messages-container">
            <div class="empty-state">
                <div class="empty-icon">💬</div>
                <div>欢迎来到通用聊天档案馆</div>
                <div style="margin-top: 6px;">左侧选择一个会话开始查看</div>
            </div>
        </div>
    </main>

    <div id="statsModal" class="stats-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeStats()">&times;</span>
            <h2 class="modal-title">📊 数据看板</h2>
            <div class="charts-grid">
                <div class="chart-box">
                    <h3>平台消息分布</h3>
                    <div class="canvas-container">
                        <canvas id="platformChart"></canvas>
                    </div>
                </div>
                <div class="chart-box">
                    <h3>每月消息走势</h3>
                    <div class="canvas-container">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
                <div class="chart-box" style="grid-column: span 2;">
                    <h3>高频词预览</h3>
                    <div id="wordCloud" class="word-cloud-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="galleryModal" class="gallery-modal">
        <div class="modal-content" style="max-width: 1180px;">
            <span class="modal-close" onclick="closeGallery()">&times;</span>
            <h2 class="modal-title">🖼️ 图片画廊</h2>
            <div id="galleryGrid" class="gallery-grid"></div>
        </div>
    </div>

    <div id="imageLightbox" class="image-lightbox" onclick="closeImageLightbox()">
        <span class="modal-close" style="color:white; top:28px; right:36px;">&times;</span>
        <img id="lightboxImg" src="" alt="放大查看图片" />
    </div>

    <script>
        let archiveData = null;
        let allSessions = [];
        let currentFilter = "all";
        let currentKeyword = "";
        let chartsRendered = false;
        let platformChartInstance = null;
        let monthlyChartInstance = null;

        const sessionListEl = document.getElementById("sessionList");
        const messagesArea = document.getElementById("messagesArea");
        const chatTitleEl = document.getElementById("chatTitle");
        const chatMetaEl = document.getElementById("chatMeta");
        const searchInputEl = document.getElementById("searchInput");
        const filterTagsEl = document.getElementById("filterTags");

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(value) {
            return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function getSessionDate(session) {
            return session?.createdAt || session?.updatedAt || "";
        }

        function getFirstAssistantModel(session) {
            if (!session || !Array.isArray(session.messages)) return "";
            const msg = session.messages.find(m => m && m.role === "assistant" && (m.model || m.displayRole));
            return (msg?.model || msg?.displayRole || "").trim();
        }

        function buildFilterTags() {
            const sources = Array.from(new Set(allSessions.map(s => s?.source).filter(Boolean))).sort();
            const tags = ["all", ...sources];

            filterTagsEl.innerHTML = "";
            tags.forEach(source => {
                const btn = document.createElement("button");
                btn.className = `tag-btn ${source === currentFilter ? "active" : ""}`;
                btn.textContent = source === "all" ? "全部" : source;
                btn.onclick = () => {
                    currentFilter = source;
                    updateActiveFilterButtons();
                    renderSidebar();
                };
                filterTagsEl.appendChild(btn);
            });
        }

        function updateActiveFilterButtons() {
            const buttons = filterTagsEl.querySelectorAll(".tag-btn");
            buttons.forEach(btn => {
                const text = btn.textContent.trim();
                const match = currentFilter === "all" ? text === "全部" : text === currentFilter;
                btn.classList.toggle("active", match);
            });
        }

        function getFilteredSessions() {
            const keyword = currentKeyword.trim().toLowerCase();

            return allSessions.filter(session => {
                const matchFilter = currentFilter === "all" || session.source === currentFilter;

                if (!keyword) return matchFilter;

                const inTitle = (session.title || "").toLowerCase().includes(keyword);
                const inModel = (getFirstAssistantModel(session) || "").toLowerCase().includes(keyword);
                const inMessages = (session.messages || []).some(msg => {
                    const content = (msg.content || "").toLowerCase();
                    const reasoning = (msg.reasoning || "").toLowerCase();
                    const model = (msg.model || msg.displayRole || "").toLowerCase();
                    return content.includes(keyword) || reasoning.includes(keyword) || model.includes(keyword);
                });

                return matchFilter && (inTitle || inMessages || inModel);
            });
        }

        function renderSidebar() {
            const filtered = getFilteredSessions();
            sessionListEl.innerHTML = "";

            if (!filtered.length) {
                sessionListEl.innerHTML = `<div class="loading-box">没有匹配的会话</div>`;
                return;
            }

            filtered.forEach((session, index) => {
                const item = document.createElement("div");
                item.className = "session-item";
                if (index === 0) item.dataset.default = "1";

                const mainModel = getFirstAssistantModel(session);
                const dateText = escapeHtml((getSessionDate(session) || "").split(" ")[0]);

                item.innerHTML = `
                    <div class="session-title">${escapeHtml(session.title || "未命名对话")}</div>
                    <div class="session-meta">
                        <div class="meta-left">
                            <span class="badge source-badge">${escapeHtml(session.source || "未知")}</span>
                            ${mainModel ? `<span class="badge model-badge" title="${escapeHtml(mainModel)}">${escapeHtml(mainModel)}</span>` : ""}
                        </div>
                        <span>${dateText}</span>
                    </div>
                `;

                item.onclick = () => {
                    document.querySelectorAll(".session-item").forEach(el => el.classList.remove("active"));
                    item.classList.add("active");
                    loadMessages(session, currentKeyword);
                };

                sessionListEl.appendChild(item);
            });

            const first = sessionListEl.querySelector(".session-item");
            if (first) {
                first.classList.add("active");
                loadMessages(filtered[0], currentKeyword);
            }
        }

        function getAvatarInfo(msg) {
            const role = (msg?.role || "").toLowerCase();
            const displayName = msg?.displayRole || msg?.model || (role === "user" ? "我" : role || "AI");

            if (role === "user") {
                return { emoji: "🙂", name: displayName || "我", rowClass: "user-msg" };
            }
            if (role === "tool") {
                return { emoji: "🧰", name: displayName || "tool", rowClass: "tool-msg" };
            }
            if (role === "system") {
                return { emoji: "⚙️", name: displayName || "system", rowClass: "system-msg" };
            }
            return { emoji: "🤖", name: displayName || "AI", rowClass: "assistant-msg" };
        }

        function buildHighlightedHtml(text, keyword) {
            const safe = escapeHtml(text || "");
            if (!keyword || !String(keyword).trim()) return safe;
            const reg = new RegExp(`(${escapeRegExp(keyword)})`, "gi");
            return safe.replace(reg, "<mark>$1</mark>");
        }

        function loadMessages(session, keyword = "") {
            chatTitleEl.textContent = session.title || "未命名会话";

            const assistantModel = getFirstAssistantModel(session);
            const metaParts = [
                session.source || "未知平台",
                session.createdAt || "",
                assistantModel || ""
            ].filter(Boolean);
            chatMetaEl.textContent = metaParts.join(" · ");

            messagesArea.innerHTML = "";

            const messages = Array.isArray(session.messages) ? session.messages : [];
            if (!messages.length) {
                messagesArea.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>这个会话没有可显示的消息</div></div>`;
                return;
            }

            messages.forEach(msg => {
                const row = document.createElement("div");
                const avatar = getAvatarInfo(msg);

                row.className = `message-row ${avatar.rowClass}`;

                let reasoningHTML = "";
                if (msg.reasoning && String(msg.reasoning).trim()) {
                    const reasoningSafe = buildHighlightedHtml(msg.reasoning, keyword);
                    reasoningHTML = `
                        <div class="reasoning-toggle" onclick="toggleReasoning(this)">已提取思考过程（点击展开）</div>
                        <div class="reasoning-box">${reasoningSafe}</div>
                    `;
                }

                const contentHtml = msg.content
                    ? `<div class="text-content">${buildHighlightedHtml(msg.content, keyword)}</div>`
                    : "";

                const images = Array.isArray(msg.images) ? msg.images.filter(Boolean) : [];
                const imageHtml = images.length
                    ? `<div class="chat-image-grid">
                        ${images.map(src => `
                            <img
                                src="${escapeHtml(src)}"
                                class="chat-bubble-img"
                                alt="聊天图片"
                                onclick="event.stopPropagation(); openImageLightbox(this.src)"
                            />
                        `).join("")}
                    </div>`
                    : "";

                row.innerHTML = `
                    <div class="avatar-container"> <div class="avatar">${avatar.emoji}</div><div class="avatar-name" title="${escapeHtml(avatar.name)}">${escapeHtml(avatar.name)}</div></div>
                    <div class="bubble">${reasoningHTML}${contentHtml}${imageHtml}<div class="msg-time">${escapeHtml(msg.time || "")}</div></div>
                `;

                messagesArea.appendChild(row);
            });

            messagesArea.scrollTop = 0;
        }

        function toggleReasoning(btn) {
            const box = btn.nextElementSibling;
            box.style.display = box.style.display === "block" ? "none" : "block";
        }

        function openStats() {
            document.getElementById("statsModal").style.display = "flex";
            renderCharts();
        }

        function closeStats() {
            document.getElementById("statsModal").style.display = "none";
        }

        function openGallery() {
            const modal = document.getElementById("galleryModal");
            const galleryGrid = document.getElementById("galleryGrid");
            galleryGrid.innerHTML = "";

            const allImages = [];
            allSessions.forEach(session => {
                (session.messages || []).forEach(msg => {
                    const images = Array.isArray(msg.images) ? msg.images : [];
                    images.forEach(src => {
                        if (src) {
                            allImages.push({
                                src,
                                time: msg.time || "",
                                role: msg.displayRole || msg.role || "",
                                source: session.source || ""
                            });
                        }
                    });
                });
            });

            if (!allImages.length) {
                galleryGrid.innerHTML = `<div class="loading-box">没有可展示的图片</div>`;
            } else {
                allImages.forEach(img => {
                    const card = document.createElement("div");
                    card.className = "gallery-card";
                    card.innerHTML = `
                        <img src="${escapeHtml(img.src)}" alt="聊天图片" onclick="event.stopPropagation(); openImageLightbox(this.src)">
                        <div class="gallery-meta">
                            <span>${escapeHtml(img.role || img.source || "image")}</span>
                            <span>${escapeHtml(img.time)}</span>
                        </div>
                    `;
                    card.onclick = () => openImageLightbox(img.src);
                    galleryGrid.appendChild(card);
                });
            }

            modal.style.display = "flex";
        }

        function closeGallery() {
            document.getElementById("galleryModal").style.display = "none";
        }

        function openImageLightbox(imageSrc) {
            const lightbox = document.getElementById("imageLightbox");
            const lightboxImg = document.getElementById("lightboxImg");
            lightboxImg.src = imageSrc;
            lightbox.style.display = "flex";
        }

        function closeImageLightbox() {
            document.getElementById("imageLightbox").style.display = "none";
        }

        function renderCharts() {
            const platformCounts = {};
            const monthlyCounts = {};
            const wordFreq = {};

            const stopWords = new Set([
                "的","了","是","我","你","他","她","它","在","和","就","也","都","而","与","及",
                "一个","我们","你们","他们","自己","这个","那个","然后","可以","一下","已经","如果",
                "还是","因为","所以","进行","需要","这里","就是","没有","不会","一个","一种"
            ]);

            allSessions.forEach(session => {
                (session.messages || []).forEach(msg => {
                    const source = session.source || "Unknown";
                    platformCounts[source] = (platformCounts[source] || 0) + 1;

                    const timeText = msg.time || session.createdAt || "";
                    if (timeText.length >= 7) {
                        const month = timeText.substring(0, 7);
                        monthlyCounts[month] = (monthlyCounts[month] || 0) + 1;
                    }

                    const content = `${msg.content || ""} ${msg.reasoning || ""}`;
                    const words = content
                        .replace(/[^\u4e00-\u9fa5a-zA-Z0-9]+/g, " ")
                        .split(/\s+/)
                        .map(w => w.trim())
                        .filter(Boolean);

                    words.forEach(word => {
                        if (word.length < 2) return;
                        if (stopWords.has(word)) return;
                        wordFreq[word] = (wordFreq[word] || 0) + 1;
                    });
                });
            });

            const platformCtx = document.getElementById("platformChart");
            const monthlyCtx = document.getElementById("monthlyChart");

            if (platformChartInstance) platformChartInstance.destroy();
            if (monthlyChartInstance) monthlyChartInstance.destroy();

            platformChartInstance = new Chart(platformCtx, {
                type: "doughnut",
                data: {
                    labels: Object.keys(platformCounts),
                    datasets: [{
                        data: Object.values(platformCounts),
                        backgroundColor: ["#82c3ff", "#9fd2ff", "#74b6ff", "#b8e1ff", "#5eaaf5", "#d7efff"],
                        borderWidth: 2,
                        borderColor: "#fff"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: "62%"
                }
            });

            const sortedMonths = Object.keys(monthlyCounts).sort();
            monthlyChartInstance = new Chart(monthlyCtx, {
                type: "line",
                data: {
                    labels: sortedMonths,
                    datasets: [{
                        label: "消息数",
                        data: sortedMonths.map(m => monthlyCounts[m]),
                        borderColor: "#5eaaf5",
                        backgroundColor: "rgba(111,183,255,0.18)",
                        tension: 0.35,
                        fill: true,
                        pointBackgroundColor: "#fff",
                        pointBorderColor: "#5eaaf5",
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            const cloudContainer = document.getElementById("wordCloud");
            cloudContainer.innerHTML = "";

            const topWords = Object.entries(wordFreq)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 40);

            const maxFreq = topWords.length ? topWords[0][1] : 1;
            const colors = ["#5eaaf5", "#7cbcf8", "#90c8fb", "#4d97e0", "#6baee9", "#3d88d1"];

            topWords.forEach(([word, count], index) => {
                const span = document.createElement("span");
                span.className = "cloud-word";
                span.textContent = word;
                span.title = `出现 ${count} 次`;
                span.style.fontSize = `${15 + (count / maxFreq) * 26}px`;
                span.style.color = colors[index % colors.length];
                const angle = Math.random() * 24 - 12;
                span.style.transform = `rotate(${angle}deg)`;
                cloudContainer.appendChild(span);
            });

            chartsRendered = true;
        }

        async function loadArchive() {
            try {
                const response = await fetch("./archive.json");
                if (!response.ok) {
                    throw new Error(`读取 archive.json 失败：${response.status}`);
                }

                archiveData = await response.json();
                allSessions = Array.isArray(archiveData.sessions) ? archiveData.sessions.slice() : [];
                allSessions.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                document.getElementById("totalSessionCount").textContent =
                    (archiveData.sessionCount || allSessions.length || 0).toLocaleString();

                const totalMessages = archiveData.messageCount || allSessions.reduce((sum, s) => {
                    return sum + ((s.messages || []).length);
                }, 0);

        document.getElementById("totalMessageCount").textContent = totalMessages.toLocaleString();

        buildFilterTags();
        renderSidebar();

        searchInputEl.addEventListener("input", (e) => {
            currentKeyword = e.target.value || "";
            renderSidebar();
        });

        document.getElementById("statsModal").addEventListener("click", function (e) {
            if (e.target === this) closeStats();
        });

        document.getElementById("galleryModal").addEventListener("click", function (e) {
            if (e.target === this) closeGallery();
        });

        document.getElementById("imageLightbox").addEventListener("click", function (e) {
            if (e.target === this) closeImageLightbox();
        });
                    } catch (err) {
                        console.error(err);
                        sessionListEl.innerHTML = `
                            <div class="error-box">
                                读取 archive.json 失败。<br />
                                请确认 index.html 和 archive.json 在同一目录下，并通过本地静态服务器打开页面。
                            </div>
                        `;
                        messagesArea.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-icon">⚠️</div>
                                <div>数据载入失败</div>
                                <div style="margin-top:6px;">${escapeHtml(err.message || "")}</div>
                            </div>
                        `;
                        chatTitleEl.textContent = "载入失败";
                        chatMetaEl.textContent = "请检查 archive.json 路径或启动方式";
                    }
                }

                loadArchive();
    </script>
</body>
</html>
